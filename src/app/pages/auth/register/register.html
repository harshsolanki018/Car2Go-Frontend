<section class="min-h-screen flex items-center justify-center bg-background">
  <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border">

    <h2 class="text-2xl font-bold text-primary text-center">
      Create New Account
    </h2>

    <p class="text-sm text-muted text-center mt-2">
      Sign up to start renting cars easily.
    </p>

    <form class="mt-6 space-y-4" (ngSubmit)="register()" #registerForm="ngForm">

  <!-- Full Name -->
  <div>
    <label for="registerName" class="text-sm font-medium text-primary">Full Name</label>
    <input
      id="registerName"
      type="text"
      [(ngModel)]="name"
      name="name"
      [disabled]="otpSent"
      autocomplete="name"
      required
      class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
      placeholder="Virat Kohli"
    />
  </div>

  <!-- Email -->
  <div>
    <label for="registerEmail" class="text-sm font-medium text-primary">Email</label>
    <input
      id="registerEmail"
      type="email"
      [(ngModel)]="email"
      name="email"
      [disabled]="otpSent"
      autocomplete="email"
      required
      class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
      placeholder="you@example.com"
    />
  </div>

  <!-- Phone -->
  <div>
    <label for="registerPhone" class="text-sm font-medium text-primary">Phone Number</label>
    <input
      id="registerPhone"
      type="tel"
      [(ngModel)]="phone"
      name="phone"
      [disabled]="otpSent"
      autocomplete="tel"
      required
      pattern="[0-9]{10}"
      minlength="10"
      maxlength="10"
      inputmode="numeric"
      class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
      placeholder="9876543210"
    />
  </div>

  <!-- Password -->
  <div>
    <label for="registerPassword" class="text-sm font-medium text-primary">Password</label>
    <div class="relative">
      <input
        id="registerPassword"
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        name="password"
        [disabled]="otpSent"
        autocomplete="new-password"
        required
        minlength="8"
        class="w-full mt-1 border rounded-md px-3 py-3 pr-10 text-sm"
        placeholder="Min 8 with Aa1@"
      />
      <button
        type="button"
        (click)="showPassword = !showPassword"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted"
      >
        <fa-icon [icon]="showPassword ? faEye : faEyeSlash"></fa-icon>
      </button>
    </div>
  </div>

  <!-- Confirm Password -->
  <div>
    <label for="registerConfirmPassword" class="text-sm font-medium text-primary">
      Confirm Password
    </label>
    <div class="relative">
      <input
        id="registerConfirmPassword"
        [type]="showConfirmPassword ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        [disabled]="otpSent"
        autocomplete="new-password"
        required
        class="w-full mt-1 border rounded-md px-3 py-3 pr-10 text-sm"
        placeholder="Re-enter password"
      />
      <button
        type="button"
        (click)="showConfirmPassword = !showConfirmPassword"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted"
      >
        <fa-icon [icon]="showConfirmPassword ? faEye : faEyeSlash"></fa-icon>
      </button>
    </div>
  </div>

  <!-- OTP -->
  <div *ngIf="otpSent">
    <label for="registerOtp" class="text-sm font-medium text-primary">OTP</label>
    <input
      id="registerOtp"
      type="text"
      [(ngModel)]="otp"
      name="otp"
      required
      class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
      placeholder="Enter OTP"
    />
    <button
      type="button"
      (click)="resendOtp()"
      [disabled]="isSubmitting || resendCountdown > 0"
      class="mt-2 text-xs text-accent font-semibold disabled:opacity-50"
    >
      {{ resendCountdown > 0 ? ('Resend OTP in ' + resendCountdown + 's') : 'Resend OTP' }}
    </button>
  </div>

  <!-- Terms -->
  <div class="flex items-start gap-2 text-sm">
    <input
      id="registerAcceptTerms"
      type="checkbox"
      [(ngModel)]="acceptTerms"
      name="acceptTerms"
      [disabled]="otpSent"
      autocomplete="off"
      required
      class="mt-1"
    />
    <label for="registerAcceptTerms" class="text-muted">
      I agree to the
      <span class="text-accent font-medium cursor-pointer">
        Terms & Conditions
      </span>
    </label>
  </div>

  <!-- Register Button -->
  <button
    type="submit"
    [disabled]="registerForm.invalid || isVerifying || isSubmitting"
    class="w-full bg-accent text-white py-3 rounded-md text-sm font-medium
           disabled:opacity-50 disabled:cursor-not-allowed">
    {{ otpSent ? 'Verify OTP' : 'Register' }}
  </button>

</form>


    <p class="text-sm text-center text-muted mt-6">
      Already have an account?
      <a routerLink="/login" class="text-accent font-medium">
        Login
      </a>
    </p>

  </div>
</section>
