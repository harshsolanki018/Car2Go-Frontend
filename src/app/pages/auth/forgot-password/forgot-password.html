<section class="min-h-screen flex items-center justify-center bg-background">
  <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border">
    <h2
      class="text-2xl font-bold text-center"
      [class.text-owner-primary]="isOwnerPortal"
      [class.text-primary]="!isOwnerPortal"
    >
      {{ portalLabel }} Forgot Password
    </h2>
    <p
      class="text-sm text-center mt-2"
      [class.text-owner-muted]="isOwnerPortal"
      [class.text-muted]="!isOwnerPortal"
    >
      We will send an OTP to your email to reset your password.
    </p>

    <form class="mt-6 space-y-4" (ngSubmit)="otpSent ? resetPassword() : requestOtp()">
      <div>
        <label
          for="fpEmail"
          class="text-sm font-medium"
          [class.text-owner-primary]="isOwnerPortal"
          [class.text-primary]="!isOwnerPortal"
        >
          Email
        </label>
        <input
          id="fpEmail"
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
          class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
          placeholder="you@example.com"
          [disabled]="otpSent || isSubmitting"
        />
      </div>

      <div *ngIf="otpSent">
        <label
          for="fpOtp"
          class="text-sm font-medium"
          [class.text-owner-primary]="isOwnerPortal"
          [class.text-primary]="!isOwnerPortal"
        >
          OTP
        </label>
        <input
          id="fpOtp"
          type="text"
          [(ngModel)]="otp"
          name="otp"
          required
          class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
          placeholder="Enter OTP"
        />
        <button
          type="button"
          (click)="resendOtp()"
          [disabled]="isSubmitting || resendCountdown > 0"
          class="mt-2 text-xs font-semibold disabled:opacity-50"
          [class.text-owner-accent]="isOwnerPortal"
          [class.text-accent]="!isOwnerPortal"
        >
          {{ resendCountdown > 0 ? ('Resend OTP in ' + resendCountdown + 's') : 'Resend OTP' }}
        </button>
      </div>

      <div *ngIf="otpSent">
        <label
          for="fpPassword"
          class="text-sm font-medium"
          [class.text-owner-primary]="isOwnerPortal"
          [class.text-primary]="!isOwnerPortal"
        >
          New Password
        </label>
        <div class="relative">
          <input
            id="fpPassword"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            autocomplete="new-password"
            required
            minlength="8"
            class="w-full mt-1 border rounded-md px-3 py-3 pr-10 text-sm"
            placeholder="Min 8 with Aa1@"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs"
            [class.text-owner-muted]="isOwnerPortal"
            [class.text-muted]="!isOwnerPortal"
          >
            <fa-icon [icon]="showPassword ? faEye : faEyeSlash"></fa-icon>
          </button>
        </div>
      </div>

      <div *ngIf="otpSent">
        <label
          for="fpConfirmPassword"
          class="text-sm font-medium"
          [class.text-owner-primary]="isOwnerPortal"
          [class.text-primary]="!isOwnerPortal"
        >
          Confirm Password
        </label>
        <div class="relative">
          <input
            id="fpConfirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            required
            class="w-full mt-1 border rounded-md px-3 py-3 pr-10 text-sm"
            placeholder="Re-enter password"
          />
          <button
            type="button"
            (click)="showConfirmPassword = !showConfirmPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs"
            [class.text-owner-muted]="isOwnerPortal"
            [class.text-muted]="!isOwnerPortal"
          >
            <fa-icon [icon]="showConfirmPassword ? faEyeSlash : faEye"></fa-icon>
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isSubmitting"
        class="w-full text-white py-3 rounded-md text-sm font-medium"
        [class.bg-owner-accent]="isOwnerPortal"
        [class.bg-accent]="!isOwnerPortal"
      >
        {{ isSubmitting ? (otpSent ? 'Resetting Password...' : 'Please wait...') : (otpSent ? 'Reset Password' : 'Send OTP') }}
      </button>
    </form>
  </div>
</section>
