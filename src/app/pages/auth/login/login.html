<section class="min-h-screen flex items-center justify-center bg-background">
  <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border">
    <h2 class="text-2xl font-bold text-primary text-center">
      Login
    </h2>

    <p class="text-sm text-muted text-center mt-2">
      Welcome back! Please enter your details.
    </p>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="mt-6 space-y-4">


      <div>
        <label for="loginEmail" class="text-sm font-medium text-primary">Email</label>
        <input
          id="loginEmail"
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
          class="w-full mt-1 border rounded-md px-3 py-3 text-sm"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="loginPassword" class="text-sm font-medium text-primary">Password</label>
        <div class="relative">
          <input
            id="loginPassword"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full mt-1 border rounded-md px-3 py-3 pr-10 text-sm"
            placeholder="********"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted"
          >
             <fa-icon [icon]="showPassword ? faEye : faEyeSlash"></fa-icon>
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-accent text-white py-3 rounded-md text-sm font-medium"
      >
        Login
      </button>
    </form>

    <p class="text-xs text-right mt-2">
      <a routerLink="/forgot-password" class="text-accent font-medium">
        Forgot password?
      </a>
    </p>

    <p class="text-sm text-center text-muted mt-6">
      Don't have an account?
      <a routerLink="/register" class="text-accent font-medium">
        Register
      </a>
    </p>

  </div>
</section>
