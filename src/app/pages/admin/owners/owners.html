<h2 class="text-2xl font-semibold mb-8">Owners List</h2>

<div class="bg-white p-6 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between">
  <label for="adminOwnersSearch" class="sr-only">
    Search owners
  </label>
  <div class="relative w-full md:w-1/3">
    <fa-icon
      [icon]="faMagnifyingGlass"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"
    ></fa-icon>
    <input
      id="adminOwnersSearch"
      type="text"
      [(ngModel)]="searchText"
      autocomplete="off"
      placeholder="Search by owner id, name, or email..."
      class="border rounded-md pl-9 pr-4 py-2 text-sm w-full"
    />
  </div>
</div>

<div class="bg-white rounded-xl shadow-sm overflow-x-auto">
  <table class="w-full text-sm border-collapse">
    <thead class="bg-gray-50 border-b">
      <tr>
        <th class="px-6 py-4 text-left w-[14%]">Owner ID</th>
        <th class="px-6 py-4 text-left w-[16%]">Owner Name</th>
        <th class="px-6 py-4 text-left w-[20%]">Email</th>
        <th class="px-6 py-4 text-center w-[12%]">Phone No.</th>
        <th class="px-6 py-4 text-center w-[10%]">Role</th>
        <th class="px-6 py-4 text-center w-[14%]">Join Date</th>
        <th class="px-6 py-4 text-center w-[14%]">Last Login</th>
        <th class="px-6 py-4 text-right w-[8%]">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let owner of filteredOwners" class="border-b hover:bg-gray-50">
        <td class="px-6 py-4 font-mono text-xs text-gray-600">
          {{ owner.id }}
        </td>

        <td class="px-6 py-4">
          {{ owner.name }}
        </td>

        <td class="px-6 py-4">
          {{ owner.email }}
        </td>

         <td class="px-6 py-4 text-center text-xs text-gray-600">
          {{ owner.phone || 'N/A' }}
        </td>

        <td class="px-6 py-4 text-center">
          <span class="px-2 py-1 text-xs rounded bg-blue-100 text-blue-700">
            {{ owner.role }}
          </span>
        </td>

        <td class="px-6 py-4 text-center text-xs text-gray-500">
          {{ owner.joinDate | date:'mediumDate' }}
        </td>

        <td class="px-6 py-4 text-center text-xs text-gray-500">
          {{ owner.lastLogin ? (owner.lastLogin | date:'short') : 'Never' }}
        </td>

        <td class="px-6 py-4 text-right space-x-0.5">
          <button
            (click)="toggleBlock(owner)"
            class="px-3 py-1 text-xs rounded text-white"
            [ngClass]="{
              'bg-yellow-600 hover:bg-yellow-700': !owner.blocked,
              'bg-green-600 hover:bg-green-700': owner.blocked
            }"
          >
            {{ owner.blocked ? 'Unblock' : 'Block' }}
          </button>

          <button
            (click)="deleteOwner(owner.email)"
            class="px-3 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
